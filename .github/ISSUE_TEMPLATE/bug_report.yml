name: Bug report
description: Report an installation, update, service, or management-script issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove all secrets before posting logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Which command did you run?
      render: bash
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Linux distribution
      placeholder: "Example: Debian 12, Ubuntu 24.04, Rocky Linux 9"
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: "Example: amd64, arm64"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove API keys, tokens, domains, IPs, and other sensitive values.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed API keys, tokens, passwords, database files, and other secrets.
          required: true
        - label: This report is about this installer/manager, not an upstream New API application bug.
          required: true
