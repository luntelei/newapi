name: Feature request
description: Suggest a scoped improvement for the installer, manager, or documentation.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests within this project's scope: lightweight installation, systemd management, backup, diagnostics, and documentation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the project add or change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This does not require modifying upstream New API source code.
          required: true
        - label: This is not for public operation, resale, proxy/VPN, bypass, evasion, abuse, or illegal use.
          required: true
